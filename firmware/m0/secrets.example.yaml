#
# Copy to secrets.yaml (gitignored) and fill in. Then gen_config.py turns this into the
# build's config.h. Quote values that contain spaces or special characters.
#
# NOTE: the Feather M0's ATWINC1500 is 2.4 GHz ONLY -- it cannot see a 5 GHz SSID.

ssid: "your-2.4GHz-ssid"
password: "your-wifi-password"

# UDP ports (must match the host; see host/protocol.py).
ddp_port: 4048
ctrl_port: 4049
